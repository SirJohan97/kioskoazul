<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Kiosko Azul</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <img src="assets/logo.png" alt="Kiosko Azul" onerror="this.style.display='none'">
      <h1>Kiosko Azul</h1>
      <p>Panel de Administración</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username"><i class="fas fa-user"></i> Usuario</label>
        <input type="text" id="username" class="form-control" placeholder="admin"
               required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••"
               required autocomplete="current-password" />
      </div>
      <div id="error-msg" style="display:none; color:#ff6b6b; font-size:0.85rem; margin-bottom:1rem; text-align:center;"></div>
      <button type="submit" class="btn btn-gold btn-w100" id="submit-btn">
        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
      </button>
    </form>

    <p style="text-align:center; margin-top:1.5rem; font-size:0.78rem; color:var(--pearl);">
      <a href="index.html" style="color:var(--gold); text-decoration:none;">
        <i class="fas fa-arrow-left"></i> Volver al sitio
      </a>
    </p>
  </div>

  <div id="toast-container"></div>

  <script>
    const API = '';

    // Si ya hay token válido, redirigir directamente
    const saved = localStorage.getItem('kb_admin');
    if (saved) {
      try {
        const { token } = JSON.parse(saved);
        if (token) window.location.href = 'admin.html';
      } catch(e) { localStorage.removeItem('kb_admin'); }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-msg');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
      err.style.display = 'none';

      const form = new FormData();
      form.append('username', document.getElementById('username').value.trim());
      form.append('password', document.getElementById('password').value);

      try {
        const res = await fetch(`${API}/api/auth/login`, { method:'POST', body: form });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || 'Error de autenticación');

        localStorage.setItem('kb_admin', JSON.stringify({
          token: data.access_token,
          admin: data.admin,
        }));
        window.location.href = 'admin.html';
      } catch(ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar Sesión';
      }
    });
  </script>

  <script src="js/admin-shared.js"></script>
</body>
</html>
