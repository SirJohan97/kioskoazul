<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Kiosko Azul</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/immersion.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Inherits from immersion.css */
      --navy-dark: #050A14;
      --gold: #D4AF37;
      --gold-glow: rgba(212, 175, 55, 0.4);
      --cream: #FDFBF7;
      --pearl: #E8E5DF;
      --glass-bg: rgba(10, 20, 40, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--navy-dark);
      background-image: radial-gradient(circle at top center, rgba(212, 175, 55, 0.1), transparent 50%),
                        radial-gradient(circle at bottom right, rgba(212, 175, 55, 0.05), transparent 40%);
      color: var(--pearl);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-container {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      object-fit: cover;
      margin-bottom: 1rem;
    }

    .auth-title {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      color: var(--gold);
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .form-group { margin-bottom: 1.5rem; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--pearl);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .form-control {
      width: 100%;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 15px var(--gold-glow);
    }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--gold-glow);
    }

    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.9rem;
    }

    .auth-link {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .auth-link:hover { text-decoration: underline; color: #FFF; }

    .btn-back {
      position: absolute;
      top: 2rem;
      left: 2rem;
      color: var(--pearl);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .btn-back:hover { opacity: 1; color: var(--gold); }

    /* Recovery Modal */
    .modal-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.8); backdrop-filter:blur(5px);
      display:none; align-items:center; justify-content:center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--glass-bg); padding:2.5rem; border-radius:15px;
      border:1px solid var(--gold); width:90%; max-width:400px;
      position:relative; animation: slideUp 0.3s ease;
    }
    .modal-close {
      position:absolute; top:1rem; right:1.5rem; color:white;
      cursor:pointer; font-size:1.5rem; background:none; border:none;
    }
    .otp-inputs {
      display:flex; gap:0.5rem; justify-content:center; margin: 1.5rem 0;
    }
    .otp-inputs input {
      width: 45px; height: 50px; text-align:center; font-size:1.5rem;
      font-weight:bold; border-radius:8px; border:1px solid var(--gold);
      background: rgba(0,0,0,0.5); color:var(--gold);
    }
  </style>
</head>
<body>
  <!-- "The Surfacing" Preloader (Skeleton) -->
  <div id="preloader">
    <div class="preloader-content">
      <img src="assets/logo.png" alt="Kiosko Azul" class="breathing-logo">
      <div class="loader-text">Navegando...</div>
    </div>
    <div class="preloader-bubbles"></div>
    <svg class="preloader-wipe" preserveAspectRatio="none" viewBox="0 0 100 100">
      <path d="M0 0 C 20 40, 80 40, 100 0 L 100 100 L 0 100 Z" />
    </svg>
  </div>

  <div id="bg-overlay" style="position:fixed; inset:0; z-index:1; background:rgba(4,7,14,0.7); pointer-events:none;"></div>
  
  <a href="menu.html" class="btn-back" style="z-index: 100;"><i class="fas fa-arrow-left"></i> Volver al Menú</a>

  <div class="auth-container" style="position:relative; z-index: 10;">
    <div class="auth-logo">
      <img src="assets/logo.png" alt="Kiosko Azul">
      <h1 class="auth-title">Bienvenido</h1>
      <p>Inicia sesión para pedir y rastrear</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>Teléfono (Ej: 04121234567)</label>
        <input type="text" id="telefono" class="form-control" required placeholder="Tu número registrado" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" class="form-control" required placeholder="••••••••" />
      </div>

      <div style="text-align: right; margin-top:-0.5rem; margin-bottom: 1.5rem;">
        <a href="#" class="auth-link" style="font-size: 0.85rem;" onclick="openRecoveryModal(event)">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Ingresar <i class="fas fa-sign-in-alt"></i></button>
    </form>

    <div class="auth-footer">
      ¿Aún no tienes cuenta? <br><br>
      <a href="registro.html" class="auth-link">Regístrate en 1 minuto</a>
    </div>
  </div>

  <!-- Modal Recuperación -->
  <div class="modal-overlay" id="recovery-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeRecoveryModal()">&times;</button>
      <h2 style="color:var(--gold); margin-bottom:1rem; font-family:'Outfit';">Recuperar Acceso</h2>
      
      <!-- Paso 1: Pedir Correo -->
      <div id="rec-step-1">
        <p style="font-size:0.9rem; margin-bottom:1rem; opacity:0.8;">Ingresa el correo electrónico asociado a tu cuenta. Te enviaremos un código de 6 dígitos.</p>
        <div class="form-group">
          <input type="email" id="rec-email" class="form-control" placeholder="tu@correo.com" required>
        </div>
        <button class="btn-submit" id="btn-request-code" onclick="requestCode()">Enviar Código <i class="fas fa-paper-plane"></i></button>
      </div>

      <!-- Paso 2: Digitar Código -->
      <div id="rec-step-2" style="display:none;">
        <p style="font-size:0.9rem; text-align:center; opacity:0.8;">Ingresa el código enviado a tu correo.</p>
        <div class="otp-inputs" id="otp-container">
          <input type="text" maxlength="1" onkeyup="moveOtp(this, 1)">
          <input type="text" maxlength="1" onkeyup="moveOtp(this, 2)">
          <input type="text" maxlength="1" onkeyup="moveOtp(this, 3)">
          <input type="text" maxlength="1" onkeyup="moveOtp(this, 4)">
          <input type="text" maxlength="1" onkeyup="moveOtp(this, 5)">
          <input type="text" maxlength="1" onkeyup="moveOtp(this, 6)">
        </div>
        <div class="form-group">
          <label>Nueva Contraseña</label>
          <input type="password" id="rec-new-pwd" class="form-control" placeholder="••••••••">
        </div>
        <button class="btn-submit" id="btn-reset-pwd" onclick="resetPassword()">Confirmar Cambio <i class="fas fa-check"></i></button>
      </div>
    </div>
  </div>

  <script>
    function openRecoveryModal(e) { e.preventDefault(); document.getElementById('recovery-modal').style.display = 'flex'; }
    function closeRecoveryModal() { document.getElementById('recovery-modal').style.display = 'none'; }
    
    function moveOtp(el, next) {
      if(el.value.length === 1) {
        let inputs = document.getElementById('otp-container').querySelectorAll('input');
        if(next <= inputs.length) inputs[next-1].focus();
      }
    }

    async function requestCode() {
      const email = document.getElementById('rec-email').value.trim();
      if(!email) return alert("Ingresa tu correo");
      
      const btn = document.getElementById('btn-request-code');
      btn.innerHTML = 'Enviando...'; btn.disabled = true;

      try {
        const r = await fetch('/api/auth/recuperar-password', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({correo: email})
        });
        const d = await r.json();
        alert(d.msg);
        if(r.ok) {
          document.getElementById('rec-step-1').style.display = 'none';
          document.getElementById('rec-step-2').style.display = 'block';
        }
      } catch(e) {
        alert("Error de conexión");
      }
      btn.innerHTML = 'Enviar Código <i class="fas fa-paper-plane"></i>'; btn.disabled = false;
    }

    async function resetPassword() {
      const email = document.getElementById('rec-email').value.trim();
      const pwd = document.getElementById('rec-new-pwd').value;
      const inputs = document.getElementById('otp-container').querySelectorAll('input');
      let code = "";
      inputs.forEach(i => code += i.value);

      if(code.length !== 6 || !pwd) return alert("Completa todos los campos");

      const btn = document.getElementById('btn-reset-pwd');
      btn.innerHTML = 'Validando...'; btn.disabled = true;

      try {
        const r = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({correo: email, codigo: code, nueva_password: pwd})
        });
        const d = await r.json();
        
        if(!r.ok) {
          alert(d.detail || "Error validando código");
        } else {
          alert("¡Contraseña actualizada con éxito! Ya puedes iniciar sesión.");
          closeRecoveryModal();
          document.getElementById('rec-step-2').style.display = 'none';
          document.getElementById('rec-step-1').style.display = 'block';
        }
      } catch(e) {
        alert("Error de conexión");
      }
      btn.innerHTML = 'Confirmar Cambio <i class="fas fa-check"></i>'; btn.disabled = false;
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const t = document.getElementById('telefono').value.trim();
      const p = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');

      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
      btn.disabled = true;

      try {
        const r = await fetch('/api/clientes/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({telefono: t, password: p})
        });

        if (!r.ok) {
          const d = await r.json();
          alert(d.detail || 'Error al iniciar sesión');
          btn.innerHTML = 'Ingresar <i class="fas fa-sign-in-alt"></i>';
          btn.disabled = false;
          return;
        }

        const data = await r.json();
        localStorage.setItem('kb_cliente', JSON.stringify(data.cliente));
        window.location.href = 'menu.html';
      } catch (err) {
        alert("Error de conexión");
        btn.innerHTML = 'Ingresar <i class="fas fa-sign-in-alt"></i>';
        btn.disabled = false;
      }
    });
  </script>

  <!-- JS: Global Immersion Logic -->
  <script src="js/immersion.js"></script>
</body>
</html>
