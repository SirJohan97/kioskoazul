<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Kiosko Azul Admin</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="assets/logo.png" alt="Logo" onerror="this.style.display='none'">
      <div><span>Kiosko Azul</span><small>Admin Panel</small></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <a href="admin.html" class="nav-link active"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a href="admin-pedidos.html" class="nav-link"><i class="fas fa-receipt"></i> Pedidos</a>
      <div class="nav-section">Gestión</div>
      <a href="admin-menu.html" class="nav-link"><i class="fas fa-utensils"></i> Menú</a>
      <a href="admin-promociones.html" class="nav-link"><i class="fas fa-tag"></i> Promociones</a>
      <div class="nav-section">Sitio</div>
      <a href="index.html" target="_blank" class="nav-link"><i class="fas fa-globe"></i> Ver Sitio</a>
      <a href="menu.html" target="_blank" class="nav-link"><i class="fas fa-book-open"></i> Ver Menú</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-badge">
        <div class="avatar" id="admin-avatar">A</div>
        <div class="info">
          <div class="name" id="admin-name">Admin</div>
          <div class="rol" id="admin-rol">superadmin</div>
        </div>
      </div>
      <button class="btn btn-outline btn-sm btn-w100" style="margin-top:0.75rem;" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="btn btn-outline btn-sm" id="menu-toggle" style="display:none;" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <span class="topbar-title">Dashboard</span>
      </div>
      <div class="topbar-actions">
        <span id="fecha-hoy" style="font-size:0.8rem;color:var(--pearl);"></span>
        <button class="btn btn-gold btn-sm" onclick="window.location='admin-menu.html'"><i class="fas fa-plus"></i> Nuevo Plato</button>
      </div>
    </header>

    <div class="admin-content">

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-icon gold"><i class="fas fa-receipt"></i></div>
          <div><div class="stat-value" id="stat-pedidos-hoy">—</div><div class="stat-label">Pedidos Hoy</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-dollar-sign"></i></div>
          <div><div class="stat-value" id="stat-ingresos">—</div><div class="stat-label">Ingresos Hoy</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
          <div><div class="stat-value" id="stat-pendientes">—</div><div class="stat-label">Pendientes / Prep.</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fas fa-chart-pie"></i></div>
          <div><div class="stat-value" id="stat-ticket">—</div><div class="stat-label">Ticket Promedio</div></div>
        </div>
      </div>

      <!-- Últimos Pedidos -->
      <div class="card">
        <div class="card-header">
          <span class="card-title"><i class="fas fa-receipt" style="color:var(--gold);margin-right:0.5rem;"></i>Últimos Pedidos</span>
          <a href="admin-pedidos.html" class="btn btn-outline btn-sm">Ver todos</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ref</th><th>Cliente</th><th>Total</th><th>Método</th><th>Estado</th><th>Hora</th><th>Acción</th>
              </tr>
            </thead>
            <tbody id="table-pedidos">
              <tr><td colspan="7" style="text-align:center;color:var(--pearl);padding:2rem;">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
  const API = '';

  // ── Auth guard ──────────────────────────────────────────────
  let authToken = null;
  (function(){
    const saved = localStorage.getItem('kb_admin');
    if (!saved) return window.location.href = 'admin-login.html';
    try {
      const { token, admin } = JSON.parse(saved);
      authToken = token;
      document.getElementById('admin-name').textContent = admin.nombre || admin.username;
      document.getElementById('admin-rol').textContent  = admin.rol;
      document.getElementById('admin-avatar').textContent = (admin.nombre || admin.username)[0].toUpperCase();
    } catch(e) { localStorage.removeItem('kb_admin'); window.location.href = 'admin-login.html'; }
  })();

  function logout() {
    localStorage.removeItem('kb_admin');
    window.location.href = 'admin-login.html';
  }

  function authHeaders() {
    return { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' };
  }

  // ── Toast ───────────────────────────────────────────────────
  function toast(msg, type='success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<i class="toast-icon fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i><span class="toast-msg">${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  // ── Fecha ───────────────────────────────────────────────────
  document.getElementById('fecha-hoy').textContent = new Date().toLocaleDateString('es-VE', { weekday:'long', day:'numeric', month:'long' });

  // ── Stats ───────────────────────────────────────────────────
  async function loadStats() {
    try {
      const r = await fetch(`${API}/api/stats`, { headers: authHeaders() });
      if (!r.ok) throw new Error();
      const d = await r.json();
      document.getElementById('stat-pedidos-hoy').textContent = d.pedidos_hoy;
      document.getElementById('stat-ingresos').textContent    = `$${d.ingresos_hoy.toFixed(2)}`;
      document.getElementById('stat-pendientes').textContent  = d.pendientes;
      document.getElementById('stat-ticket').textContent      = `$${d.ticket_promedio.toFixed(2)}`;
    } catch(e) { console.warn('Stats no disponibles'); }
  }

  // ── Pedidos ─────────────────────────────────────────────────
  const estadoBadge = {
    pendiente:  'badge-orange', preparando: 'badge-blue',
    listo:      'badge-green',  entregado:  'badge-gold',
    cancelado:  'badge-red',
  };

  async function loadPedidos() {
    try {
      const r = await fetch(`${API}/api/pedidos?limit=10`, { headers: authHeaders() });
      const pedidos = await r.json();
      const tbody = document.getElementById('table-pedidos');

      if (!pedidos.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--pearl);padding:2rem;">Sin pedidos aún</td></tr>';
        return;
      }

      tbody.innerHTML = pedidos.map(p => {
        const hora = new Date(p.creado_en + 'Z').toLocaleTimeString('es-VE', {hour:'2-digit', minute:'2-digit'});
        const cls  = estadoBadge[p.estado] || 'badge-gray';
        const rowOpacity = p.estado === 'cancelado' ? '0.5' : '1';
        return `<tr style="opacity:${rowOpacity}; transition:opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='${rowOpacity}'">
          <td><b>${p.order_ref}</b></td>
          <td>${p.cliente_nombre}</td>
          <td style="color:var(--gold);font-weight:600;">$${p.total.toFixed(2)}</td>
          <td>${p.metodo_pago}</td>
          <td><span class="badge ${cls}">${p.estado}</span></td>
          <td>${hora}</td>
          <td>
            <select onchange="cambiarEstado(${p.id}, this.value)" class="form-control" style="padding:0.3rem 0.5rem;border-radius:6px;font-size:0.8rem;">
              ${['pendiente','preparando','listo','entregado','cancelado'].map(s =>
                `<option value="${s}" ${s===p.estado?'selected':''}>${s}</option>`
              ).join('')}
            </select>
          </td>
        </tr>`;
      }).join('');
    } catch(e) { console.warn('Error pedidos', e); }
  }

  // Auto-refresco cada 15 segundos
  setInterval(loadStats, 15000);
  setInterval(loadPedidos, 15000);

  async function cambiarEstado(id, estado) {
    try {
      const r = await fetch(`${API}/api/pedidos/${id}/estado`, {
        method: 'PUT',
        headers: authHeaders(),
        body: JSON.stringify({ estado }),
      });
      if (!r.ok) throw new Error();
      toast(`Estado actualizado: ${estado}`);
      loadStats();
    } catch(e) { toast('Error actualizando estado', 'error'); }
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  // ── Responsive ──────────────────────────────────────────────
  if (window.innerWidth < 769) {
    document.getElementById('menu-toggle').style.display = 'flex';
  }

  loadStats();
  loadPedidos();
</script>
</body>
</html>
